<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" font-family="Helvetica, Arial, sans-serif">
  <style>
    .q { fill:#1d3557; }
    .a { fill:#2a9d8f; }
    .warn { fill:#e76f51; }
    .box { rx:8; }
    text { fill:#ffffff; font-size:14px; text-anchor:middle; }
    .small { font-size:12px; }
    line { stroke:#457b9d; stroke-width:2; }
    .lbl { fill:#1d3557; font-size:12px; font-style:italic; text-anchor:middle; }
  </style>
  <!-- Root -->
  <rect class="q box" x="330" y="20" width="200" height="50"/>
  <text x="430" y="42">What do you want</text>
  <text x="430" y="58">your wins to feel like?</text>

  <!-- Branch labels -->
  <line x1="430" y1="70" x2="150" y2="130"/>
  <text class="lbl" x="250" y="95">safe &amp; steady</text>
  <line x1="430" y1="70" x2="430" y2="130"/>
  <text class="lbl" x="470" y="105">inevitable</text>
  <line x1="430" y1="70" x2="710" y2="130"/>
  <text class="lbl" x="615" y="95">fast &amp; sharp</text>

  <!-- Safe branch -->
  <rect class="q box" x="50" y="130" width="200" height="50"/>
  <text x="150" y="152">Prefer buffing your army</text>
  <text x="150" y="168">or out-shooting theirs?</text>
  <line x1="150" y1="180" x2="90" y2="250"/>
  <text class="lbl" x="95" y="215">buffs</text>
  <line x1="150" y1="180" x2="230" y2="250"/>
  <text class="lbl" x="225" y="215">shooters</text>
  <rect class="a box" x="20" y="250" width="140" height="60"/>
  <text x="90" y="275">TEMPLE</text>
  <text class="small" x="90" y="295">Righteousness + Daylight</text>
  <rect class="a box" x="180" y="250" width="140" height="60"/>
  <text x="250" y="275">GROVE</text>
  <text class="small" x="250" y="295">Focus economy + Primal</text>

  <!-- Inevitable branch -->
  <rect class="q box" x="330" y="130" width="200" height="50"/>
  <text x="430" y="152">Grow from enemies,</text>
  <text x="430" y="168">or from win streaks?</text>
  <line x1="430" y1="180" x2="380" y2="250"/>
  <text class="lbl" x="375" y="215">enemies</text>
  <line x1="430" y1="180" x2="500" y2="250"/>
  <text class="lbl" x="510" y="215">streaks</text>
  <rect class="a box" x="310" y="250" width="140" height="60"/>
  <text x="380" y="275">NECROPOLIS</text>
  <text class="small" x="380" y="295">Necromancy + Rufus</text>
  <rect class="warn box" x="470" y="250" width="150" height="60"/>
  <text x="545" y="275">SCHISM</text>
  <text class="small" x="545" y="295">Communion (advanced)</text>

  <!-- Fast branch -->
  <rect class="q box" x="620" y="130" width="200" height="50"/>
  <text x="720" y="152">Precision tempo, or</text>
  <text x="720" y="168">overwhelming swarm?</text>
  <line x1="720" y1="180" x2="690" y2="250"/>
  <text class="lbl" x="670" y="215">precision</text>
  <line x1="720" y1="180" x2="780" y2="250"/>
  <text class="lbl" x="790" y="215">swarm</text>
  <rect class="a box" x="620" y="250" width="140" height="60"/>
  <text x="690" y="275">DUNGEON</text>
  <text class="small" x="690" y="295">Stances + Dancers</text>
  <rect class="warn box" x="700" y="330" width="150" height="60"/>
  <text x="775" y="355">HIVE</text>
  <text class="small" x="775" y="375">Haste + Larvae (expert)</text>
  <line x1="780" y1="250" x2="775" y2="330"/>

  <!-- Bottom check row -->
  <rect class="q box" x="180" y="420" width="500" height="50"/>
  <text x="430" y="442">Final check: how much time do you have before mid-game?</text>
  <text class="small" x="430" y="458">Tempo picks (Dungeon/Hive) must win by ~week 4-5 vs. Necropolis/Schism clocks</text>
  <line x1="430" y1="470" x2="430" y2="520"/>
  <rect class="a box" x="280" y="520" width="300" height="60"/>
  <text x="430" y="545">Cross-check the Matchup Grid chapter</text>
  <text class="small" x="430" y="565">30 pairings rated with the reasoning shown</text>
</svg>

<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a3b2a"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#f5efe2"/>
  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#3a2b1a">Dungeon — Week 1 Build Order Decision Tree</text>

  <!-- Day 1 -->
  <rect x="360" y="60" width="180" height="56" rx="8" fill="#6b4226" stroke="#3a2b1a" stroke-width="2"/>
  <text x="450" y="83" text-anchor="middle" font-size="14" fill="#f5efe2" font-weight="bold">Day 1</text>
  <text x="450" y="101" text-anchor="middle" font-size="13" fill="#f5efe2">Build Amphitheater</text>

  <line x1="450" y1="116" x2="450" y2="150" stroke="#4a3b2a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Day 2 -->
  <rect x="360" y="150" width="180" height="56" rx="8" fill="#6b4226" stroke="#3a2b1a" stroke-width="2"/>
  <text x="450" y="173" text-anchor="middle" font-size="14" fill="#f5efe2" font-weight="bold">Day 2</text>
  <text x="450" y="191" text-anchor="middle" font-size="13" fill="#f5efe2">Byzantine Palace → T2</text>

  <line x1="450" y1="206" x2="450" y2="240" stroke="#4a3b2a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Day 3 -->
  <rect x="360" y="240" width="180" height="56" rx="8" fill="#6b4226" stroke="#3a2b1a" stroke-width="2"/>
  <text x="450" y="263" text-anchor="middle" font-size="14" fill="#f5efe2" font-weight="bold">Day 3</text>
  <text x="450" y="281" text-anchor="middle" font-size="13" fill="#f5efe2">Byzantine Palace → T3</text>

  <line x1="450" y1="296" x2="450" y2="330" stroke="#4a3b2a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Day 4 -->
  <rect x="360" y="330" width="180" height="56" rx="8" fill="#6b4226" stroke="#3a2b1a" stroke-width="2"/>
  <text x="450" y="353" text-anchor="middle" font-size="14" fill="#f5efe2" font-weight="bold">Day 4</text>
  <text x="450" y="371" text-anchor="middle" font-size="13" fill="#f5efe2">Build Labyrinth</text>

  <line x1="450" y1="386" x2="450" y2="420" stroke="#4a3b2a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Day 5 decision diamond -->
  <polygon points="450,420 560,462 450,504 340,462" fill="#a8763e" stroke="#3a2b1a" stroke-width="2"/>
  <text x="450" y="452" text-anchor="middle" font-size="13" fill="#f5efe2" font-weight="bold">Day 5–7:</text>
  <text x="450" y="470" text-anchor="middle" font-size="12" fill="#f5efe2">What's short?</text>

  <!-- three branches -->
  <line x1="380" y1="480" x2="150" y2="540" stroke="#4a3b2a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="504" x2="450" y2="540" stroke="#4a3b2a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="520" y1="480" x2="750" y2="540" stroke="#4a3b2a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="40" y="540" width="220" height="60" rx="8" fill="#3f6b3a" stroke="#2b4a28" stroke-width="2"/>
  <text x="150" y="562" text-anchor="middle" font-size="12" fill="#f5efe2" font-weight="bold">Gold is stable</text>
  <text x="150" y="580" text-anchor="middle" font-size="12" fill="#f5efe2">→ Build the Bank</text>

  <rect x="340" y="540" width="220" height="60" rx="8" fill="#8a3b3b" stroke="#5e2626" stroke-width="2"/>
  <text x="450" y="562" text-anchor="middle" font-size="12" fill="#f5efe2" font-weight="bold">Gems/Crystals short</text>
  <text x="450" y="580" text-anchor="middle" font-size="12" fill="#f5efe2">→ Build the Marketplace</text>

  <rect x="640" y="540" width="220" height="60" rx="8" fill="#2f4f6b" stroke="#1e3547" stroke-width="2"/>
  <text x="750" y="562" text-anchor="middle" font-size="12" fill="#f5efe2" font-weight="bold">Hero needs spells to clear</text>
  <text x="750" y="580" text-anchor="middle" font-size="12" fill="#f5efe2">→ Build the Mage Guild</text>

  <text x="450" y="614" text-anchor="middle" font-size="11" fill="#5c4a36" font-style="italic">Target entering Week 2: Palace fully upgraded, both core dwellings active, rare resources banked for the mid-game push.</text>
</svg>

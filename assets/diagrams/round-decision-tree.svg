<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" font-family="Helvetica, Arial, sans-serif">
  <style>
    .q { fill:#1d3557; }
    .a { fill:#2a9d8f; }
    .box { rx:8; }
    text { fill:#ffffff; font-size:14px; text-anchor:middle; }
    .small { font-size:12px; }
    line { stroke:#457b9d; stroke-width:2; }
    .lbl { fill:#1d3557; font-size:12px; font-style:italic; text-anchor:middle; }
  </style>
  <rect class="q box" x="300" y="20" width="260" height="50"/>
  <text x="430" y="42">Is any stack of yours about to</text>
  <text x="430" y="58">take a fight-losing hit?</text>
  <line x1="430" y1="70" x2="160" y2="130"/>
  <text class="lbl" x="270" y="95">yes</text>
  <line x1="430" y1="70" x2="430" y2="130"/>
  <text class="lbl" x="450" y="105">no</text>

  <rect class="a box" x="40" y="130" width="240" height="70"/>
  <text x="160" y="152">PROTECT first</text>
  <text class="small" x="160" y="170">Carapace (big single hit) / Taunt</text>
  <text class="small" x="160" y="185">Radiant Armour / Arina's Chosen</text>

  <rect class="q box" x="300" y="130" width="260" height="50"/>
  <text x="430" y="152">Will your army attack that</text>
  <text x="430" y="168">same target this round?</text>
  <line x1="430" y1="180" x2="280" y2="240"/>
  <text class="lbl" x="335" y="205">yes</text>
  <line x1="430" y1="180" x2="580" y2="240"/>
  <text class="lbl" x="525" y="205">no</text>

  <rect class="a box" x="160" y="240" width="240" height="70"/>
  <text x="280" y="262">AMPLIFY before damage</text>
  <text class="small" x="280" y="280">Vulnerability FIRST, then the volleys</text>
  <text class="small" x="280" y="295">(sequence is the whole combo)</text>

  <rect class="q box" x="460" y="240" width="240" height="50"/>
  <text x="580" y="262">Is one enemy stack the</text>
  <text x="580" y="278">whole problem?</text>
  <line x1="580" y1="290" x2="480" y2="350"/>
  <text class="lbl" x="510" y="315">yes</text>
  <line x1="580" y1="290" x2="680" y2="350"/>
  <text class="lbl" x="655" y="315">no</text>

  <rect class="a box" x="360" y="350" width="240" height="70"/>
  <text x="480" y="372">CONTROL it out of the game</text>
  <text class="small" x="480" y="390">Sleep / Berserk / Web / Silence</text>
  <text class="small" x="480" y="405">(check the immunity list first)</text>

  <rect class="q box" x="620" y="350" width="220" height="50"/>
  <text x="730" y="372">Are 2+ enemy stacks</text>
  <text x="730" y="388">adjacent to each other?</text>
  <line x1="730" y1="400" x2="640" y2="460"/>
  <text class="lbl" x="665" y="425">yes</text>
  <line x1="730" y1="400" x2="800" y2="460"/>
  <text class="lbl" x="790" y="425">no</text>

  <rect class="a box" x="530" y="460" width="220" height="70"/>
  <text x="640" y="482">AREA damage</text>
  <text class="small" x="640" y="500">Fireball / Chain Lightning / Black Hole</text>
  <text class="small" x="640" y="515">(Black Hole makes its own clusters)</text>

  <rect class="a box" x="60" y="460" width="220" height="70"/>
  <text x="170" y="482">DEFAULT: single-target value</text>
  <text class="small" x="170" y="500">Ice Bolt / Umbral Grip / Despair</text>
  <text class="small" x="170" y="515">or bank mana + Heroic Strike</text>
  <line x1="800" y1="460" x2="280" y2="495"/>
</svg>
